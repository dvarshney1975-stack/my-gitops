apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 1h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: prometheus
      version: 25.x
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    server:
      persistentVolume:
        enabled: true
        size: 1Gi
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
        limits:
          memory: 192Mi
      retention: 24h           # was 7d — biggest memory savings
      global:
        scrape_interval: 60s   # was 15s default — 4x less data
        evaluation_interval: 60s
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    prometheus-node-exporter:
      enabled: true
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          memory: 24Mi
    kube-state-metrics:
      enabled: true
      resources:
        requests:
          cpu: 5m
          memory: 24Mi
        limits:
          memory: 48Mi
    configmapReload:
      prometheus:
        enabled: false       # the sidecar that keeps crashing
