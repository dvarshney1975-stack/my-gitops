# Standalone one-shot migration Job. Re-create after image bumps with:
#   kubectl -n agentgate delete job agentgate-migrate --ignore-not-found
#   kubectl -n agentgate apply -f apps/agentgate/migrations.yaml
# (Flux re-applies on every reconcile but doesn't recreate completed Jobs.)
apiVersion: batch/v1
kind: Job
metadata:
  name: agentgate-migrate
  namespace: agentgate
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: migrate
          image: ghcr.io/dvarshney1975-stack/agentgate-api:latest
          imagePullPolicy: Always
          command: ["/usr/local/bin/run-migrations"]
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@agentgate-postgres:5432/$(POSTGRES_DB)?sslmode=disable"
          envFrom:
            - secretRef: { name: agentgate-postgres-creds }
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
