# demo-idp — the in-house OIDC provider for the Acme.io demo tenant.
#
# Replaces the noop IDP we shipped originally and the Keycloak deploy
# that didn't fit on the t3.small. Single Go binary, ~30 MB RAM,
# real OIDC discovery / JWKS / password grant / RFC 8693
# token-exchange. Source: cmd/demo-idp/.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgate-demo-idp
  namespace: agentgate
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels: { app: agentgate-demo-idp }
  template:
    metadata:
      labels: { app: agentgate-demo-idp }
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: idp
          image: ghcr.io/dvarshney1975-stack/agentgate-demo-idp:0c50cc5f
          imagePullPolicy: Always
          env:
            - name: ISSUER_URL
              value: "https://idp-3-135-43-26.sslip.io"
            - name: PORT
              value: "8080"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 96Mi
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            periodSeconds: 30
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: agentgate-demo-idp
  namespace: agentgate
spec:
  selector: { app: agentgate-demo-idp }
  ports:
    - port: 80
      targetPort: 8080
      name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgate-demo-idp
  namespace: agentgate
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - idp-3-135-43-26.sslip.io
      secretName: agentgate-demo-idp-tls
  rules:
    - host: idp-3-135-43-26.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgate-demo-idp
                port:
                  number: 80
