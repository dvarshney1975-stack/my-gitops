apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgate-admin
  namespace: agentgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgate-admin
  template:
    metadata:
      labels:
        app: agentgate-admin
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: admin
        image: ghcr.io/dvarshney1975-stack/agentgate-admin:e70373ea
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: agentgate-admin
  namespace: agentgate
spec:
  selector:
    app: agentgate-admin
  ports:
  - port: 80
    targetPort: 80
