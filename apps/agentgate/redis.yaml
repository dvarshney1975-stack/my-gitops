apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgate-redis
  namespace: agentgate
spec:
  replicas: 1
  selector:
    matchLabels: { app: agentgate-redis }
  template:
    metadata:
      labels: { app: agentgate-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agentgate-redis
  namespace: agentgate
spec:
  selector: { app: agentgate-redis }
  ports:
    - port: 6379
      targetPort: 6379
