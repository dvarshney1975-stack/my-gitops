apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgate-api
  namespace: agentgate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgate-api
  template:
    metadata:
      labels:
        app: agentgate-api
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: api
        image: ghcr.io/dvarshney1975-stack/agentgate-api:bc293e70
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "192Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: agentgate-api
  namespace: agentgate
spec:
  selector:
    app: agentgate-api
  ports:
  - port: 80
    targetPort: 8080
